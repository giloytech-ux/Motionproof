<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1219">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MotionProof</title>
<style>
  :root {
    --bg: #0f1219; --panel: #151923; --border: #242938;
    --text: #e6e9ef; --muted: #8a92a6; --teal: #22b8a0;
    --red: #ef4444; --green: #22c55e; --yellow: #eab308;
    --sans: 'DM Sans', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    min-height: 100dvh; overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  .app { display: flex; flex-direction: column; min-height: 100dvh;
    padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  header { padding: 12px 16px; display: flex; justify-content: space-between;
    align-items: center; border-bottom: 1px solid var(--border); }
  h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  .badge { font-family: var(--mono); font-size: 11px; color: var(--muted);
    background: var(--panel); padding: 4px 8px; border-radius: 4px;
    border: 1px solid var(--border); }
  .stage { position: relative; flex: 1; background: #000; overflow: hidden;
    display: flex; align-items: center; justify-content: center; }
  #video { position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transform: scaleX(-1); }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%;
    transform: scaleX(-1); pointer-events: none; }
  .overlay { position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 6px;
    pointer-events: none; z-index: 2; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { background: rgba(21,25,35,0.85); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-family: var(--mono);
    font-size: 11px; color: var(--muted);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .chip .k { color: var(--muted); }
  .chip .v { color: var(--text); margin-left: 4px; }
  .chip.ok .v { color: var(--green); }
  .chip.warn .v { color: var(--yellow); }
  .chip.err .v { color: var(--red); }
  .chip.teal .v { color: var(--teal); }
  .controls { padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
    background: var(--panel); border-top: 1px solid var(--border); }
  button { width: 100%; min-height: 48px; background: var(--teal);
    color: #06110e; border: none; border-radius: 8px;
    font-family: var(--sans); font-size: 15px; font-weight: 600;
    cursor: pointer; touch-action: manipulation; }
  button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  button.stop { background: var(--red); color: #fff; }
  .hint { text-align: center; color: var(--muted); font-size: 12px;
    margin-top: 8px; font-family: var(--mono); }
  .splash { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    color: var(--muted); font-family: var(--mono); font-size: 13px;
    padding: 24px; text-align: center; z-index: 3; }
  .splash.hidden { display: none; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err-msg { color: var(--yellow); font-size: 11px; margin-top: 8px;
    text-align: center; font-family: var(--mono); min-height: 32px;
    word-break: break-word; line-height: 1.4; }
  .err-msg.error { color: var(--red); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>MotionProof</h1>
    <div class="badge" id="fps">-- fps</div>
  </header>
  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="splash" id="splash">
      <div style="font-size:15px;color:var(--text);">MediaPipe on-device tracking</div>
      <div>Tap Start to grant camera access.<br>Face mesh + hand landmarks run locally.</div>
    </div>
    <div class="overlay" id="overlay" style="display:none;">
      <div class="row">
        <div class="chip" id="chipFace"><span class="k">face</span><span class="v">--</span></div>
        <div class="chip" id="chipHand"><span class="k">hand</span><span class="v">--</span></div>
      </div>
      <div class="row">
        <div class="chip" id="chipLeft"><span class="k">L eye</span><span class="v">--</span></div>
        <div class="chip" id="chipRight"><span class="k">R eye</span><span class="v">--</span></div>
        <div class="chip" id="chipGrip"><span class="k">grip</span><span class="v">--</span></div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button id="btn">Start Camera</button>
    <div class="err-msg" id="err">ready</div>
    <div class="hint">Uses front camera. All processing on-device.</div>
  </div>
</div>

<script>
  // Global error surfacing — every silent failure now appears in the status line.
  const errEl = document.getElementById('err');
  const logs = [];
  window.__log = (msg, isErr) => {
    logs.push(msg);
    if (errEl) {
      errEl.textContent = logs.slice(-2).join(' · ');
      if (isErr) errEl.classList.add('error');
    }
    console.log('[mp]', msg);
  };
  window.addEventListener('error', (e) => {
    const where = e.filename ? ' @ ' + e.filename.split('/').pop() + ':' + e.lineno : '';
    window.__log('ERR: ' + (e.message || 'script error') + where, true);
  });
  window.addEventListener('unhandledrejection', (e) => {
    const r = e.reason;
    window.__log('REJ: ' + (r?.message || r?.toString?.() || 'promise rejected'), true);
  });
  setTimeout(() => {
    if (!window.__moduleLoaded) {
      window.__log('Module did not load in 8s — CDN/network issue', true);
    }
  }, 8000);
  window.__log('boot: HTML ready');
</script>

<script type="module">
window.__log('boot: module starting');
let FilesetResolver, FaceLandmarker, HandLandmarker;
try {
  const mod = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs");
  FilesetResolver = mod.FilesetResolver;
  FaceLandmarker = mod.FaceLandmarker;
  HandLandmarker = mod.HandLandmarker;
  window.__moduleLoaded = true;
  window.__log('boot: MediaPipe imported');
} catch (e) {
  window.__log('IMPORT FAIL: ' + (e.message || e), true);
  throw e;
}

const $ = (id) => document.getElementById(id);
const video = $('video'), canvas = $('canvas'), ctx = canvas.getContext('2d');
const btn = $('btn'), splash = $('splash'), overlay = $('overlay');

const state = {
  running: false, stream: null,
  faceLM: null, handLM: null,
  lastFrameT: 0, fpsEMA: 0,
};

const WASM_BASE = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm";
const FACE_MODEL = "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task";
const HAND_MODEL = "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task";

async function makeLandmarker(Klass, modelPath, extra) {
  const fileset = await FilesetResolver.forVisionTasks(WASM_BASE);
  for (const delegate of ["GPU", "CPU"]) {
    try {
      return await Klass.createFromOptions(fileset, {
        baseOptions: { modelAssetPath: modelPath, delegate },
        runningMode: "VIDEO",
        ...extra,
      });
    } catch (e) {
      window.__log(`${Klass.name} ${delegate} failed — trying next`);
      if (delegate === "CPU") throw e;
    }
  }
}

async function loadModels() {
  splash.innerHTML = '<div class="spinner"></div><div>Loading models…</div>';
  window.__log('loading face model');
  state.faceLM = await makeLandmarker(FaceLandmarker, FACE_MODEL, {
    outputFaceBlendshapes: true, numFaces: 1,
  });
  window.__log('loading hand model');
  state.handLM = await makeLandmarker(HandLandmarker, HAND_MODEL, { numHands: 2 });
  window.__log('models ready');
}

async function startCamera() {
  window.__log('requesting camera');
  state.stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false,
  });
  video.srcObject = state.stream;
  await new Promise((res) => video.onloadedmetadata = res);
  await video.play();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  window.__log('camera ' + canvas.width + 'x' + canvas.height);
}

function stopCamera() {
  if (state.stream) state.stream.getTracks().forEach(t => t.stop());
  state.stream = null;
  state.running = false;
  overlay.style.display = 'none';
  splash.classList.remove('hidden');
  splash.innerHTML = '<div style="font-size:15px;color:var(--text);">Stopped</div><div>Tap Start to resume.</div>';
  btn.textContent = 'Start Camera';
  btn.classList.remove('stop');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function blendshape(result, name) {
  const cats = result?.faceBlendshapes?.[0]?.categories;
  if (!cats) return 0;
  const c = cats.find(x => x.categoryName === name);
  return c ? c.score : 0;
}

function handOpenScore(landmarks) {
  if (!landmarks) return 0;
  const w = landmarks[0], ref = landmarks[5];
  const scale = Math.hypot(ref.x - w.x, ref.y - w.y) || 1;
  let sum = 0;
  for (const i of [8, 12, 16, 20]) {
    const t = landmarks[i];
    sum += Math.hypot(t.x - w.x, t.y - w.y) / scale;
  }
  return sum / 4;
}

function drawFace(lms) {
  ctx.fillStyle = '#22b8a0';
  for (const p of lms) {
    ctx.beginPath();
    ctx.arc(p.x * canvas.width, p.y * canvas.height, 1.2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHand(lms) {
  const edges = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
  ctx.strokeStyle = '#eab308';
  ctx.lineWidth = 2;
  for (const [a,b] of edges) {
    ctx.beginPath();
    ctx.moveTo(lms[a].x * canvas.width, lms[a].y * canvas.height);
    ctx.lineTo(lms[b].x * canvas.width, lms[b].y * canvas.height);
    ctx.stroke();
  }
  ctx.fillStyle = '#ef4444';
  for (const p of lms) {
    ctx.beginPath();
    ctx.arc(p.x * canvas.width, p.y * canvas.height, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function setChip(id, label, val, cls) {
  const el = $(id);
  el.className = 'chip' + (cls ? ' ' + cls : '');
  el.innerHTML = `<span class="k">${label}</span><span class="v">${val}</span>`;
}

function render(faceRes, handRes) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const faceLMs = faceRes?.faceLandmarks?.[0];
  if (faceLMs) drawFace(faceLMs);
  const hands = handRes?.landmarks || [];
  for (const h of hands) drawHand(h);

  if (faceLMs) {
    const L = blendshape(faceRes, 'eyeBlinkLeft');
    const R = blendshape(faceRes, 'eyeBlinkRight');
    setChip('chipFace', 'face', 'detected', 'ok');
    setChip('chipLeft', 'L eye', L > 0.5 ? 'closed' : 'open', L > 0.5 ? 'warn' : 'teal');
    setChip('chipRight', 'R eye', R > 0.5 ? 'closed' : 'open', R > 0.5 ? 'warn' : 'teal');
  } else {
    setChip('chipFace', 'face', 'none', 'err');
    setChip('chipLeft', 'L eye', '--');
    setChip('chipRight', 'R eye', '--');
  }

  if (hands.length) {
    const s = handOpenScore(hands[0]);
    const open = s > 1.9;
    setChip('chipHand', 'hand', `${hands.length}`, 'ok');
    setChip('chipGrip', 'grip', open ? 'open' : 'closed', open ? 'teal' : 'warn');
  } else {
    setChip('chipHand', 'hand', 'none', 'err');
    setChip('chipGrip', 'grip', '--');
  }
}

function loop() {
  if (!state.running) return;
  const now = performance.now();
  if (state.lastFrameT) {
    const fps = 1000 / (now - state.lastFrameT);
    state.fpsEMA = state.fpsEMA ? state.fpsEMA * 0.9 + fps * 0.1 : fps;
    $('fps').textContent = `${state.fpsEMA.toFixed(0)} fps`;
  }
  state.lastFrameT = now;
  let faceRes = null, handRes = null;
  try { faceRes = state.faceLM.detectForVideo(video, now); } catch (e) {}
  try { handRes = state.handLM.detectForVideo(video, now); } catch (e) {}
  render(faceRes, handRes);
  requestAnimationFrame(loop);
}

async function start() {
  errEl.classList.remove('error');
  logs.length = 0;
  window.__log('start tapped');
  btn.disabled = true;
  btn.textContent = 'Loading…';
  try {
    if (!state.faceLM) await loadModels();
    await startCamera();
    splash.classList.add('hidden');
    overlay.style.display = 'flex';
    state.running = true;
    btn.textContent = 'Stop';
    btn.classList.add('stop');
    btn.disabled = false;
    window.__log('running');
    requestAnimationFrame(loop);
  } catch (e) {
    window.__log('START FAIL: ' + (e.message || e), true);
    btn.textContent = 'Start Camera';
    btn.disabled = false;
    splash.classList.remove('hidden');
    splash.innerHTML = `<div style="color:var(--red);">Failed to start</div><div>${e.message || e}</div>`;
  }
}

btn.addEventListener('click', () => {
  if (state.running) stopCamera();
  else start();
});
window.__log('ready — tap Start');
</script>
</body>
</html>
